<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto Pro - Lucky Numbers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <main class="container">
    <header>
      <h1>Lotto <span class="highlight">Pro</span></h1>
      <p>Click the button to generate your lucky numbers.</p>
    </header>

    <div id="balls-container" class="balls-grid">
      <div class="placeholder-text">Your numbers will appear here</div>
    </div>

    <div class="actions">
      <button id="generate-btn" class="primary-btn">
        Generate Numbers
        <span class="icon">✨</span>
      </button>
    </div>

    <section class="partnership-section">
      <hr class="divider">
      <h2>Partnership <span class="highlight">Inquiry</span></h2>
      <p class="section-desc">Got a business idea? We'd love to hear from you!</p>
      
      <form action="https://formspree.io/f/xjgalnvn" method="POST" class="contact-form">
        <div class="form-group">
          <input type="text" name="name" placeholder="Your Name" required>
        </div>
        <div class="form-group">
          <input type="email" name="email" placeholder="Your Email" required>
        </div>
        <div class="form-group">
          <textarea name="message" placeholder="How can we help you?" rows="4" required></textarea>
        </div>
        <button type="submit" class="secondary-btn">Send Message</button>
      </form>
    </section>

    <footer>
      <p>© 2026 Lotto Pro. Good luck!</p>
    </footer>
  </main>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
